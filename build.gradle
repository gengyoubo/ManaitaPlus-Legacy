plugins {
	id 'fabric-loom' version '1.10.4'
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group


repositories {
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"manaita_plus_general" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}

}

sourceSets {
	main {
		java {
			srcDirs = ['src/main/java']
			exclude '**/blockEntity/**'
			exclude '**/event/**'
			exclude '**/datagen/**'
			exclude '**/jei/**'
			exclude '**/transform/**'
			exclude '**/ManaitaManaitaPlusTransformationService.java'
			exclude '**/util/Helper.java'
			exclude '**/util/ManaitaPlusClassLoaderFactory.java'
			exclude '**/*Renderer.java'
			exclude '**/gui/**'
			exclude '**/core/MPEntityCore.java'
			exclude '**/core/MPKeyBoardCore.java'
			exclude '**/core/MPRecipeSerializerCore.java'
			exclude '**/item/MPBowItem.java'
			exclude '**/item/MPGodSwordItem.java'
			exclude '**/item/MPSwordItem.java'
			exclude '**/item/tool/MPPaxelItem.java'
			exclude '**/item/portable/MPBrewingPortable.java'
			exclude '**/item/portable/MPFurnacePortable.java'
		}
		resources {
			srcDirs = ['src/main/resources', 'src/generated/resources']
			exclude 'META-INF/mods.toml'
			exclude 'META-INF/accesstransformer.cfg'
			exclude 'META-INF/services/**'
		}
	}
	client {
		java {
			srcDirs += ['src/client/java']
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
}

processResources {
	inputs.property "version", project.version
	inputs.property "mod_id", project.mod_id
	inputs.property "mod_name", project.mod_name
	inputs.property "mod_description", project.mod_description
	inputs.property "mod_authors", project.mod_authors

	filesMatching("fabric.mod.json") {
		expand([
				version: project.version,
				mod_id: project.mod_id,
				mod_name: project.mod_name,
				mod_description: project.mod_description,
				mod_authors: project.mod_authors
		])
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

jar {
	inputs.property "projectName", project.name
	from("LICENSE") {
		rename { "${it}_${project.name}"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			from components.java
		}
	}
	repositories {
	}
}
