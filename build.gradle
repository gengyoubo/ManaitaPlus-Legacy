plugins {
	id 'fabric-loom' version '1.10.4'
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group


repositories {
	maven { url "https://cursemaven.com/" }
	maven { url "https://maven.ladysnake.org/releases" }
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"manaita_plus_general" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}

}

sourceSets {
	main {
		java {
			srcDirs = ['src/main/java']
			exclude '**/blockEntity/**'
			exclude '**/event/**'
			exclude '**/datagen/**'
			exclude '**/jei/**'
			exclude '**/transform/**'
			exclude '**/ManaitaManaitaPlusTransformationService.java'
			exclude '**/util/Helper.java'
			exclude '**/util/ManaitaPlusClassLoaderFactory.java'
			exclude '**/*Renderer.java'
			exclude '**/gui/**'
		}
		resources {
			srcDirs = ['src/main/resources', 'src/generated/resources']
			exclude 'META-INF/mods.toml'
			exclude 'META-INF/accesstransformer.cfg'
			exclude 'META-INF/services/**'
		}
	}
	client {
		java {
			srcDirs += ['src/client/java']
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
	modImplementation "curse.maven:jei-238222:7920913"
	modImplementation "curse.maven:trinkets-341284:5173501"
	modImplementation "dev.onyxstudios.cardinal-components-api:cardinal-components-base:5.2.0"
	modImplementation "dev.onyxstudios.cardinal-components-api:cardinal-components-entity:5.2.0"
}

processResources {
	inputs.property "version", project.version
	inputs.property "mod_id", project.mod_id
	inputs.property "mod_name", project.mod_name
	inputs.property "mod_description", project.mod_description
	inputs.property "mod_authors", project.mod_authors

	filesMatching("fabric.mod.json") {
		expand([
				version: project.version,
				mod_id: project.mod_id,
				mod_name: project.mod_name,
				mod_description: project.mod_description,
				mod_authors: project.mod_authors
		])
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

tasks.matching { it.name == 'sourcesJar' }.configureEach {
	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

tasks.named('remapJar').configure {
	archiveBaseName.set(mod_name)
	archiveVersion.set(mod_version)
	archiveClassifier.set(mod_loader)

	manifest {
		attributes([
				"Specification-Title"     : mod_id,
				"Specification-Vendor"    : mod_authors,
				"Specification-Version"   : "1",
				"Implementation-Title"    : project.name,
				"Implementation-Version"  : project.version,
				"Implementation-Vendor"   : mod_authors,
				"Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
		])
	}
}

publishing {
	publications {
		register('mavenJava', MavenPublication) {
			artifactId = mod_name
			version = mod_version

			artifact(tasks.named('remapJar'))
		}
	}
	repositories {
		maven {
			url = uri("${project.projectDir}/mcmodsrepo")
		}
	}
}
